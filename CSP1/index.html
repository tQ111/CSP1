<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skeletal study</title>

<style>

:root{
  --bg:#F7F9FC;
  --surface:rgba(255,255,255,0.72);

  --border:#DCE4EE;

  --text:#0F172A;
  --sub:#64748B;

  --blue:#2563EB;
  --teal:#14B8A6;

  --shadow:0 10px 30px rgba(37,99,235,0.07);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  overflow:hidden;
  color:var(--text);
}

/* BG */

.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  z-index:0;
}

.g1{
  width:500px;
  height:500px;
  background:rgba(37,99,235,0.08);
  top:-180px;
  right:-100px;
}

.g2{
  width:400px;
  height:400px;
  background:rgba(20,184,166,0.06);
  bottom:-120px;
  left:-100px;
}

/* MAIN */

.main{
  position:relative;
  z-index:2;
  height:100vh;
  padding:20px;

  display:grid;
  grid-template-columns:1fr 340px;
  gap:18px;
}

/* LEFT */

.viewer{
  position:relative;

  background:var(--surface);
  border:1px solid rgba(255,255,255,0.8);

  backdrop-filter:blur(18px);

  border-radius:34px;
  overflow:hidden;

  box-shadow:var(--shadow);
}

/* TOP */

.top{
  position:absolute;
  top:22px;
  left:24px;
  right:24px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:5;
}

.logo{
  font-size:13px;
  color:var(--sub);
}

.search{
  width:220px;
  padding:10px 14px;

  border-radius:14px;
  border:1px solid var(--border);

  background:rgba(255,255,255,0.8);

  outline:none;
}

/* GRID */

.grid{
  position:absolute;
  inset:0;

  background-image:
  linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);

  background-size:42px 42px;
}

/* CENTER */

.center{
  position:absolute;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* SKELETON IMG */

.skeleton{
  position:relative;
  width:360px;
  opacity:0.95;

  filter:
  drop-shadow(0 10px 30px rgba(37,99,235,0.08));
}

/* LABELS */

.label{
  position:absolute;

  padding:10px 14px;

  border-radius:14px;

  background:rgba(255,255,255,0.85);

  border:1px solid var(--border);

  backdrop-filter:blur(14px);

  font-size:13px;

  box-shadow:var(--shadow);

  transition:0.2s;
  cursor:pointer;
}

.label:hover{
  transform:translateY(-3px);
  border-color:var(--blue);
}

.skull{
  top:120px;
  left:260px;
}

.ribcage{
  top:280px;
  left:180px;
}

.pelvis{
  top:470px;
  left:200px;
}

.femur{
  top:640px;
  left:250px;
}

/* RIGHT */

.side{
  background:var(--surface);

  border:1px solid rgba(255,255,255,0.8);

  backdrop-filter:blur(18px);

  border-radius:34px;

  box-shadow:var(--shadow);

  padding:22px;

  display:flex;
  flex-direction:column;

  gap:18px;
}

/* INFO */

.box{
  background:rgba(255,255,255,0.78);

  border:1px solid var(--border);

  border-radius:22px;

  padding:20px;
}

.small{
  font-size:12px;
  color:var(--sub);
  margin-bottom:10px;
}

.big{
  font-size:38px;
  margin-bottom:12px;
}

.text{
  color:var(--sub);
  line-height:1.7;
  font-size:14px;
}

/* RELATED */

.related{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  padding:12px;

  border-radius:14px;

  background:white;

  border:1px solid var(--border);

  transition:0.2s;
  cursor:pointer;
}

.item:hover{
  transform:translateX(4px);
  border-color:var(--teal);
}

</style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="main">

  <!-- LEFT -->

  <div class="viewer">

    <div class="grid"></div>

    <div class="top">

      <div class="logo">
        made by tim
      </div>

      <input class="search" placeholder="search bones...">

    </div>

    <div class="center">

      <!-- replace with real skeleton image later -->
      <img
      class="skeleton"
      src="skeleton.svg"
      >

      <div class="label skull">
        skull
      </div>

      <div class="label ribcage">
        rib cage
      </div>

      <div class="label pelvis">
        pelvis
      </div>

      <div class="label femur">
        femur
      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="side">

    <div class="box">

      <div class="small">
        selected bone
      </div>

      <div class="big">
        femur
      </div>

      <div class="text">
        the femur is the longest and strongest
        bone in the human body and connects
        the pelvis to the knee.
      </div>

    </div>

    <div class="box">

      <div class="small">
        connected structures
      </div>

      <div class="related">

        <div class="item">
          pelvis
        </div>

        <div class="item">
          patella
        </div>

        <div class="item">
          tibia
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
